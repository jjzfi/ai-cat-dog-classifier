<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Classifier</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.upload-box {
    border: 2px dashed rgba(255,255,255,0.3);
    padding: 40px;
    border-radius: 15px;
    cursor: pointer;
    margin: 20px 0;
}

.upload-box:hover {
    border-color: #00eaff;
}

button {
    background: linear-gradient(45deg, #00eaff, #0072ff);
    border: none;
    padding: 12px 25px;
    border-radius: 30px;
    color: white;
    cursor: pointer;
}

.preview img {
    width: 200px;
    margin-top: 20px;
    border-radius: 15px;
}

/* Loader */
.loader {
    border: 5px solid #333;
    border-top: 5px solid #00eaff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    margin: 20px auto;
    display: none;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Progress Bar */
.progress {
    width: 100%;
    background: #333;
    height: 10px;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 15px;
}
.name {

    color:white;
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 10px;

}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00eaff, #0072ff);
}

/* Result */
.result {
    margin-top: 15px;
    font-size: 22px;
}

.cat { color: #ff6b6b; }
.dog { color: #4ecdc4; }

</style>
</head>

<body>

<div class="container">

<h1>🐾 AI Classifier</h1>

<form method="POST" enctype="multipart/form-data" id="form">

<div class="upload-box" id="drop-area">
    <p>Drag & Drop or Click</p>
    <input type="file" name="file" id="file" hidden required>
</div>

<button type="submit">Predict</button>
</form>

<div class="loader" id="loader"></div>

{% if img_path %}
<div class="preview">
    <img src="{{ img_path }}">
</div>
{% endif %}

{% if result %}
<div class="result 
{% if 'Cat' in result %}cat{% else %}dog{% endif %}">
    {{ result }}
</div>

<div class="progress">
    <div class="progress-bar" id="bar"></div>
</div>
{% endif %}

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const dropArea = document.getElementById("drop-area");
const fileInput = document.getElementById("file");
const form = document.getElementById("form");
const loader = document.getElementById("loader");
const bar = document.getElementById("bar");
const sound = document.getElementById("sound");

// click
dropArea.addEventListener("click", () => fileInput.click());

// drag
dropArea.addEventListener("dragover", (e) => {
    e.preventDefault();
});

// drop
dropArea.addEventListener("drop", (e) => {
    e.preventDefault();
    fileInput.files = e.dataTransfer.files;
});

// loader
form.addEventListener("submit", () => {
    loader.style.display = "block";
});

// progress animation + sound
window.onload = () => {
    if(bar){
        let width = 0;
        let interval = setInterval(() => {
            width += 5;
            bar.style.width = width + "%";
            if(width >= 100){
                clearInterval(interval);
                sound.play();
            }
        }, 50);
    }
};
</script>
<div class="name">
<h1>Amjed Hamed Jabal</h1></div>
</body>
</html>
